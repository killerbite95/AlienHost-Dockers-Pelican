name: Build Docker images

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build Java ${{ matrix.java }} X11
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java:
          - "8"
          - "11"
          - "16"
          - "17"
          - "19"
          - "21"
          - "22"
          - "25"
          - "26"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./java_${{ matrix.java }}
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/alienhost-dockers-pelican:java_${{ matrix.java }}_x11
